<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOIR — لوحة التحكم</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@200;300;400;500&family=Tajawal:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#C9A84C;--gold2:#E2C97E;--dark:#0A0A0A;--dark2:#111111;--dark3:#1A1A1A;
  --border:rgba(201,168,76,0.18);--muted:#666666;--text:#F0EDE8;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--dark);color:var(--text);font-family:'Jost',sans-serif;font-weight:300;min-height:100vh;cursor:none;}

/* Cursor */
.cursor{position:fixed;width:7px;height:7px;background:var(--gold);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .2s,height .2s;}
.cursor-ring{position:fixed;width:34px;height:34px;border:1px solid var(--gold2);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);opacity:.6;}

/* Canvas */
canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;}

/* Header */
header{position:fixed;top:0;left:0;right:0;z-index:500;display:flex;justify-content:space-between;align-items:center;padding:24px 60px;background:rgba(10,10,10,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.logo{font-family:'Playfair Display',serif;font-size:20px;letter-spacing:.2em;color:var(--gold);display:flex;align-items:center;gap:10px;}
.logo-mark{width:30px;height:30px;border:1px solid var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;}
.header-right{display:flex;align-items:center;gap:24px;}
.back-link{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color .3s;cursor:none;}
.back-link:hover{color:var(--gold);}
.header-badge{font-size:10px;letter-spacing:.15em;text-transform:uppercase;background:var(--gold);color:var(--dark);padding:6px 16px;font-weight:500;}

/* Layout */
.main{padding:110px 60px 60px;position:relative;z-index:1;}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;margin-bottom:48px;}
.stat{background:var(--dark2);padding:32px 36px;border:1px solid var(--border);transition:border-color .3s;}
.stat:hover{border-color:var(--gold);}
.stat-label{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;}
.stat-value{font-family:'Playfair Display',serif;font-size:42px;font-weight:300;color:var(--gold);}
.stat-sub{font-size:11px;color:var(--muted);margin-top:6px;}

/* Form */
.form-wrap{background:var(--dark2);border:1px solid var(--border);padding:48px;margin-bottom:48px;}
.form-title{font-family:'Playfair Display',serif;font-size:28px;font-weight:300;color:var(--text);margin-bottom:36px;display:flex;align-items:center;gap:16px;}
.form-title::after{content:'';flex:1;height:1px;background:var(--border);}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:28px;}
.f-group{display:flex;flex-direction:column;gap:10px;}
.f-group.full{grid-column:span 2;}
.f-label{font-size:10px;letter-spacing:.26em;text-transform:uppercase;color:var(--muted);}
.f-input,.f-select,.f-textarea{background:transparent;border:none;border-bottom:1px solid rgba(201,168,76,.2);color:var(--text);font-family:'Tajawal',sans-serif;font-size:15px;font-weight:300;padding:10px 0;outline:none;transition:border-color .3s;cursor:none;width:100%;}
.f-input:focus,.f-select:focus,.f-textarea:focus{border-bottom-color:var(--gold);}
.f-input::placeholder,.f-textarea::placeholder{color:var(--muted);opacity:.5;}
.f-select option{background:var(--dark2);color:var(--text);}
.f-textarea{resize:none;height:80px;}
.f-file{background:transparent;border:1px solid var(--border);color:var(--muted);font-family:'Jost',sans-serif;font-size:12px;padding:12px 16px;cursor:none;width:100%;transition:border-color .3s;}
.f-file:hover{border-color:var(--gold);}
.f-file::file-selector-button{background:var(--gold);color:var(--dark);border:none;padding:6px 16px;font-family:'Jost',sans-serif;font-size:11px;letter-spacing:.1em;cursor:pointer;margin-left:12px;}
.submit-btn{margin-top:36px;width:100%;padding:16px;background:var(--gold);color:var(--dark);font-family:'Jost',sans-serif;font-size:11px;font-weight:500;letter-spacing:.26em;text-transform:uppercase;border:none;cursor:none;position:relative;overflow:hidden;transition:transform .3s,box-shadow .3s;}
.submit-btn::before{content:'';position:absolute;inset:0;background:var(--gold2);transform:scaleX(0);transform-origin:right;transition:transform .4s;}
.submit-btn span{position:relative;z-index:1;}
.submit-btn:hover::before{transform:scaleX(1);}
.submit-btn:hover{box-shadow:0 8px 40px rgba(201,168,76,.25);transform:translateY(-2px);}
.submit-btn:disabled{opacity:.5;transform:none;}

/* Toast */
.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--gold);color:var(--dark);font-family:'Jost',sans-serif;font-size:12px;letter-spacing:.15em;text-transform:uppercase;padding:14px 32px;z-index:9999;transition:transform .4s ease;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}

/* Products Table */
.table-wrap{background:var(--dark2);border:1px solid var(--border);}
.table-header{padding:32px 36px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.table-title{font-family:'Playfair Display',serif;font-size:24px;font-weight:300;color:var(--text);}
.table-count{font-size:11px;letter-spacing:.15em;color:var(--muted);}
.product-row{display:grid;grid-template-columns:80px 1fr 120px 100px 100px 80px;align-items:center;gap:20px;padding:20px 36px;border-bottom:1px solid var(--border);transition:background .3s;}
.product-row:last-child{border-bottom:none;}
.product-row:hover{background:var(--dark3);}
.product-row img{width:64px;height:64px;object-fit:cover;border:1px solid var(--border);}
.row-name{font-family:'Playfair Display',serif;font-size:16px;color:var(--text);}
.row-cat{font-size:11px;letter-spacing:.12em;color:var(--muted);margin-top:4px;text-transform:uppercase;}
.row-price{font-family:'Playfair Display',serif;font-size:20px;color:var(--gold);}
.row-stock{font-size:12px;color:var(--muted);text-align:center;}
.row-stock span{display:inline-block;padding:4px 12px;border:1px solid var(--border);}
.delete-btn{background:transparent;border:1px solid rgba(255,60,60,.3);color:rgba(255,60,60,.6);font-family:'Jost',sans-serif;font-size:10px;letter-spacing:.15em;text-transform:uppercase;padding:7px 14px;cursor:none;transition:all .3s;}
.delete-btn:hover{background:rgba(255,60,60,.1);border-color:rgba(255,60,60,.8);color:rgba(255,60,60,1);}
.empty-row{padding:60px;text-align:center;color:var(--muted);font-family:'Playfair Display',serif;font-size:18px;font-style:italic;}

@media(max-width:900px){
  header{padding:18px 24px;}
  .main{padding:90px 20px 40px;}
  .stats{grid-template-columns:1fr;}
  .form-wrap{padding:28px 20px;}
  .form-grid{grid-template-columns:1fr;}
  .f-group.full{grid-column:span 1;}
  .product-row{grid-template-columns:60px 1fr 80px;gap:12px;padding:16px 20px;}
  .row-stock,.delete-btn,.row-price{display:none;}
  .cursor,.cursor-ring{display:none;}
  body{cursor:auto;}
}
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>
<canvas id="canvas"></canvas>
<div class="toast" id="toast"></div>

<header>
  <div class="logo"><div class="logo-mark">✦</div>NOIR</div>
  <div class="header-right">
    <a href="index.html" class="back-link">← المتجر</a>
    <div class="header-badge">لوحة التحكم</div>
  </div>
</header>

<div class="main">

  <!-- Stats -->
  <div class="stats" id="stats">
    <div class="stat"><div class="stat-label">إجمالي المنتجات</div><div class="stat-value" id="stat-total">—</div><div class="stat-sub">منتج في المتجر</div></div>
    <div class="stat"><div class="stat-label">إجمالي المخزون</div><div class="stat-value" id="stat-stock">—</div><div class="stat-sub">قطعة متوفرة</div></div>
    <div class="stat"><div class="stat-label">أعلى سعر</div><div class="stat-value" id="stat-price">—</div><div class="stat-sub">دينار تونسي</div></div>
  </div>

  <!-- Form -->
  <div class="form-wrap">
    <div class="form-title">إضافة منتج جديد</div>
    <div class="form-grid">
      <div class="f-group">
        <label class="f-label">اسم المنتج</label>
        <input class="f-input" id="name" placeholder="مثال: جاكيت جلد فاخر">
      </div>
      <div class="f-group">
        <label class="f-label">السعر (DT)</label>
        <input class="f-input" id="price" type="number" placeholder="0.00">
      </div>
      <div class="f-group">
        <label class="f-label">الفئة</label>
        <input class="f-input" id="category" placeholder="مثال: جاكيتات، تيشرت، أحذية">
      </div>
      <div class="f-group">
        <label class="f-label">الكمية المتوفرة</label>
        <input class="f-input" id="stock" type="number" placeholder="0">
      </div>
      <div class="f-group full">
        <label class="f-label">الوصف</label>
        <textarea class="f-textarea" id="description" placeholder="وصف المنتج..."></textarea>
      </div>
      <div class="f-group full">
        <label class="f-label">صورة المنتج</label>
        <input class="f-file" id="image" type="file" accept="image/*">
      </div>
    </div>
    <button class="submit-btn" id="submitBtn" onclick="addProduct()">
      <span id="submitText">✦ إضافة المنتج</span>
    </button>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <div class="table-header">
      <div class="table-title">المنتجات</div>
      <div class="table-count" id="table-count">جاري التحميل...</div>
    </div>
    <div id="products-list"></div>
  </div>

</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const SUPABASE_URL = 'https://mkfbhkwfariuziyxwdka.supabase.co'
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1rZmJoa3dmYXJpdXppeXh3ZGthIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NTc4NTgsImV4cCI6MjA4OTUzMzg1OH0.r9FLozZeGO7A5QtSRceds0quuH1Zp1Cj6yd0bwxDrA4'
const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)

// Particles
const canvas = document.getElementById('canvas')
const ctx = canvas.getContext('2d')
canvas.width = innerWidth; canvas.height = innerHeight
const particles = Array.from({length:50},()=>({
  x:Math.random()*innerWidth,y:Math.random()*innerHeight,
  r:Math.random()*1.2+.3,dx:(Math.random()-.5)*.3,dy:(Math.random()-.5)*.3,a:Math.random()*.4+.1
}))
;(function loop(){
  ctx.clearRect(0,0,canvas.width,canvas.height)
  particles.forEach(p=>{
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2)
    ctx.fillStyle=`rgba(201,168,76,${p.a})`;ctx.fill()
    p.x+=p.dx;p.y+=p.dy
    if(p.x<0||p.x>canvas.width)p.dx*=-1
    if(p.y<0||p.y>canvas.height)p.dy*=-1
  })
  requestAnimationFrame(loop)
})()

// Cursor
const cursor=document.getElementById('cursor'),ring=document.getElementById('cursorRing')
let mx=0,my=0,rx=0,ry=0
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cursor.style.left=mx+'px';cursor.style.top=my+'px'})
;(function loop(){rx+=(mx-rx)*.12;ry+=(my-ry)*.12;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(loop)})()

// Toast
function showToast(msg){
  const t=document.getElementById('toast')
  t.textContent=msg;t.classList.add('show')
  setTimeout(()=>t.classList.remove('show'),3000)
}

// Load products
async function loadProducts(){
  const {data}=await supabase.from('products').select('*').order('created_at',{ascending:false})
  const list=data||[]
  // Stats
  document.getElementById('stat-total').textContent=list.length
  document.getElementById('stat-stock').textContent=list.reduce((a,p)=>a+(p.stock||0),0)
  document.getElementById('stat-price').textContent=list.length?Math.max(...list.map(p=>p.price||0)):0
  document.getElementById('table-count').textContent=`${list.length} منتج`
  // List
  const el=document.getElementById('products-list')
  if(!list.length){el.innerHTML='<div class="empty-row">✦ لا توجد منتجات بعد ✦</div>';return}
  el.innerHTML=list.map(p=>`
    <div class="product-row">
      <img src="${p.image_url}" alt="${p.name}">
      <div><div class="row-name">${p.name}</div><div class="row-cat">${p.category||''}</div></div>
      <div class="row-price">${p.price} DT</div>
      <div class="row-stock"><span>${p.stock||0} قطعة</span></div>
      <div></div>
      <button class="delete-btn" onclick="window.deleteProduct('${p.id}')">حذف</button>
    </div>
  `).join('')
}

// Add product
window.addProduct = async function(){
  const name=document.getElementById('name').value.trim()
  const price=document.getElementById('price').value
  const category=document.getElementById('category').value.trim()
  const stock=document.getElementById('stock').value
  const description=document.getElementById('description').value.trim()
  const imageFile=document.getElementById('image').files[0]
  if(!name||!price||!imageFile){showToast('⚠ اكتب الاسم والسعر وارفع صورة');return}
  const btn=document.getElementById('submitBtn')
  const txt=document.getElementById('submitText')
  btn.disabled=true;txt.textContent='جاري الرفع...'
  // Upload image
  const fileName=`${Date.now()}-${imageFile.name}`
  const {error:upErr}=await supabase.storage.from('products').upload(fileName,imageFile)
  if(upErr){showToast('⚠ فشل رفع الصورة');btn.disabled=false;txt.textContent='✦ إضافة المنتج';return}
  const {data:urlData}=supabase.storage.from('products').getPublicUrl(fileName)
  // Insert
  await supabase.from('products').insert([{
    name,price:parseFloat(price),category,stock:parseInt(stock)||0,description,image_url:urlData.publicUrl
  }])
  // Reset
  document.getElementById('name').value=''
  document.getElementById('price').value=''
  document.getElementById('category').value=''
  document.getElementById('stock').value=''
  document.getElementById('description').value=''
  document.getElementById('image').value=''
  btn.disabled=false;txt.textContent='✦ إضافة المنتج'
  showToast('✦ تمت إضافة المنتج بنجاح')
  loadProducts()
}

// Delete product
window.deleteProduct = async function(id){
  if(!confirm('هل أنت متأكد من الحذف؟'))return
  await supabase.from('products').delete().eq('id',id)
  showToast('✦ تم حذف المنتج')
  loadProducts()
}

loadProducts()
</script>
</body>
</html>
